<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fuse — Deadline Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2030">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');

  :root{
    --bg: #1B2030;
    --card: #242B40;
    --card-elevated: #2C3450;
    --ink: #EDEFF7;
    --ink-soft: #9AA3C2;
    --divider: #363F5C;

    --calm: #4FBDA4;
    --building: #E3A84B;
    --urgent: #E0703E;
    --critical: #E14B5A;
    --done: #5B6485;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .app{max-width:480px;margin:0 auto;padding:28px 18px 60px;}

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;
    font-weight:700;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--ink-soft);
    font-size:14px;
    line-height:1.5;
    margin:0 0 22px;
    max-width:380px;
  }

  .add-btn{
    display:flex; align-items:center; gap:8px;
    width:100%;
    background:var(--card-elevated);
    border:1px solid var(--divider);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:13px 16px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:28px;
    transition:border-color .15s ease;
  }
  .add-btn:hover{border-color:var(--ink-soft);}
  .add-btn svg{flex-shrink:0;}

  .section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin:0 0 12px;
    display:flex; justify-content:space-between; align-items:center;
  }

  .card{
    background:var(--card);
    border-radius:14px;
    padding:16px 16px 14px;
    margin-bottom:10px;
    border:1px solid var(--divider);
  }
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .course{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 4px;
  }
  .title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; margin:0; line-height:1.3;}
  .effort-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    padding:4px 8px;
    border-radius:20px;
    white-space:nowrap;
    border:1px solid var(--divider);
    color:var(--ink-soft);
  }

  .meta-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .countdown{font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;}
  .tier-tag{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; font-weight:600;}

  .fuse{display:flex; gap:3px; margin-bottom:12px;}
  .seg{height:6px; flex:1; border-radius:3px; background:#3A4156;}
  .seg.lit{}
  .seg.crit-pulse{animation:pulse 1.4s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){ .seg.crit-pulse{animation:none;} }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }

  .card-actions{display:flex; justify-content:flex-end;}
  .done-btn{
    background:none; border:1px solid var(--divider); color:var(--ink-soft);
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
    padding:7px 12px; border-radius:8px; cursor:pointer;
  }
  .done-btn:hover{color:var(--ink); border-color:var(--ink-soft);}

  .card.is-done{opacity:0.55;}
  .card.is-done .title{text-decoration:line-through; color:var(--ink-soft);}
  .done-check{display:flex; align-items:center; gap:6px; color:var(--done); font-family:'JetBrains Mono',monospace; font-size:11px;}

  .empty{
    color:var(--ink-soft); font-size:13px; padding:18px 0 6px; text-align:center;
    border:1px dashed var(--divider); border-radius:12px; margin-bottom:10px;
  }

  .notif-panel{
    background:var(--card); border:1px solid var(--divider); border-radius:14px;
    padding:14px 16px; margin-bottom:28px; max-height:220px; overflow-y:auto;
  }
  .notif-item{
    font-size:13px; line-height:1.5; padding:8px 0; border-bottom:1px solid var(--divider);
    display:flex; gap:8px;
  }
  .notif-item:last-child{border-bottom:none; padding-bottom:0;}
  .notif-time{color:var(--ink-soft); font-family:'JetBrains Mono',monospace; font-size:11px; flex-shrink:0; padding-top:1px;}

  .demo-box{
    border:1px dashed var(--divider); border-radius:14px; padding:14px 16px; margin-top:30px;
  }
  .demo-label{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.1em; color:var(--ink-soft); text-transform:uppercase; margin:0 0 8px;}
  .demo-now{font-family:'JetBrains Mono',monospace; font-size:12px; margin:0 0 10px; color:var(--ink-soft);}
  .demo-btn{
    background:var(--card-elevated); border:1px solid var(--divider); color:var(--ink);
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    padding:9px 14px; border-radius:9px; cursor:pointer;
  }
  .demo-btn:hover{border-color:var(--ink-soft);}

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(15,18,28,0.6);
    display:none; align-items:flex-end; justify-content:center; z-index:10;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--card); width:100%; max-width:480px;
    border-radius:20px 20px 0 0; padding:22px 18px 28px;
    border-top:1px solid var(--divider);
  }
  .sheet h2{font-family:'Space Grotesk',sans-serif; font-size:19px; margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;
  }
  .field input{
    width:100%; background:var(--bg); border:1px solid var(--divider); color:var(--ink);
    font-family:'Inter',sans-serif; font-size:14px; padding:11px 12px; border-radius:9px;
  }
  .field input:focus{outline:2px solid var(--ink-soft); outline-offset:1px;}
  .pills{display:flex; gap:8px;}
  .pill-opt{
    flex:1; text-align:center; padding:10px 0; border-radius:9px; border:1px solid var(--divider);
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .pill-opt.active{border-color:var(--ink); color:var(--ink); background:var(--card-elevated);}
  .sheet-actions{display:flex; gap:10px; margin-top:20px;}
  .btn-primary, .btn-secondary{
    flex:1; padding:13px 0; border-radius:10px; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; cursor:pointer; border:none;
  }
  .btn-primary{background:var(--ink); color:var(--bg);}
  .btn-secondary{background:none; color:var(--ink-soft); border:1px solid var(--divider);}
</style>
</head>
<body>

<div class="app">
  <p class="eyebrow">Deadline tracker</p>
  <h1>Keep the fuse lit.</h1>
  <p class="sub">Reminders that get louder as a deadline closes in, scaled to how much work it actually needs — and go quiet the moment you mark it done.</p>

  <button class="add-btn" onclick="openModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New deadline
  </button>

  <p class="section-label"><span id="open-count-label">Open</span></p>
  <div id="open-list"></div>

  <p class="section-label" style="margin-top:24px;">Notifications</p>
  <div class="notif-panel" id="notif-list"></div>

  <p class="section-label" id="done-label" style="margin-top:24px;"></p>
  <div id="done-list"></div>

  <div class="demo-box">
    <p class="demo-label">Demo control</p>
    <p class="demo-now" id="demo-now"></p>
    <button class="demo-btn" onclick="fastForward()">Fast-forward 1 day →</button>
    <button class="demo-btn" id="notif-permission-btn" onclick="enableNotifications()" style="margin-left:8px;">Enable phone notifications</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2>New deadline</h2>
    <div class="field">
      <label>Course</label>
      <input type="text" id="f-course" placeholder="e.g. Database Fundamentals">
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="e.g. ERD Assignment">
    </div>
    <div class="field">
      <label>Due date & time</label>
      <input type="datetime-local" id="f-date">
    </div>
    <div class="field">
      <label>Effort</label>
      <div class="pills" id="effort-pills">
        <div class="pill-opt" data-v="light" onclick="pickEffort('light')">Light</div>
        <div class="pill-opt active" data-v="medium" onclick="pickEffort('medium')">Medium</div>
        <div class="pill-opt" data-v="heavy" onclick="pickEffort('heavy')">Heavy</div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="addTask()">Add deadline</button>
    </div>
  </div>
</div>

<script>
const TIER_COLOR = { calm:'var(--calm)', building:'var(--building)', urgent:'var(--urgent)', critical:'var(--critical)' };
const EFFORT_SEGS = { light:3, medium:5, heavy:7 };
const EFFORT_RUNWAY = { light:4, medium:7, heavy:14 }; // "ideal" full prep window in days
const THRESH = {
  light:  { critical:1, urgent:2, building:4 },
  medium: { critical:2, urgent:4, building:7 },
  heavy:  { critical:3, urgent:7, building:14 }
};

// "now" always tracks real wall-clock time, plus an optional demo offset
// set only by the Fast-forward button (for testing without waiting).
let timeOffset = 0; // ms
let now = new Date();
let selectedEffort = 'medium';
let notifications = [];
let tasks = [];
let nextId = 1;

function tickClock(){
  now = new Date(Date.now() + timeOffset);
}

function daysFromNow(dateObj){ return (dateObj - now) / 86400000; }

function getTier(daysLeft, effort){
  const t = THRESH[effort];
  if (daysLeft < t.critical) return 'critical';
  if (daysLeft < t.urgent) return 'urgent';
  if (daysLeft < t.building) return 'building';
  return 'calm';
}

function fmtCountdown(daysLeft){
  if (daysLeft <= 0) return 'Overdue';
  const totalMinutes = daysLeft * 1440;
  if (totalMinutes < 60) return `${Math.max(1, Math.ceil(totalMinutes))}m left`;
  const d = Math.floor(daysLeft);
  const h = Math.round((daysLeft - d) * 24);
  if (d === 0) return `${h}h left`;
  return `${d}d ${h}h left`;
}

function fmtNow(d){
  return d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' }) +
    ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
}

function toLocalInputValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let notifPermissionGranted = false;

function enableNotifications(){
  if (!('Notification' in window)){
    alert('Notifications are not supported in this browser.');
    return;
  }
  Notification.requestPermission().then(perm => {
    notifPermissionGranted = (perm === 'granted');
    document.getElementById('notif-permission-btn').textContent = notifPermissionGranted ? 'Notifications enabled ✓' : 'Enable phone notifications';
  });
}

function fireRealNotification(text){
  if (notifPermissionGranted && 'Notification' in window){
    try{ new Notification('Fuse', { body: text, icon: 'icon-192.png' }); }catch(e){}
  }
}

if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

function pushNotif(text){
  notifications.unshift({ text, at: fmtNow(now) });
  fireRealNotification(text);
}

function seedTask(course, title, dueOffsetDays, effort){
  const due = new Date(now.getTime() + dueOffsetDays*86400000);
  const daysLeft = daysFromNow(due);
  const tier = getTier(daysLeft, effort);
  tasks.push({ id: nextId++, course, title, due, effort, done:false, lastTier: tier });
  pushNotif(`Added “${title}” — tracking started (${tier.toUpperCase()})`);
}

const SAVE_KEY = 'fuse-data-v1';

function saveState(){
  try{
    const data = {
      tasks: tasks.map(t => ({ ...t, due: t.due.toISOString() })),
      notifications,
      nextId,
      timeOffset
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){ /* storage unavailable, app still works this session */ }
}

function loadState(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    tasks = data.tasks.map(t => ({ ...t, due: new Date(t.due) }));
    notifications = data.notifications || [];
    nextId = data.nextId || 1;
    timeOffset = data.timeOffset || 0;
    tickClock();
    return true;
  }catch(e){ return false; }
}

// Load whatever was saved before. Only seed sample tasks the very first time
// this app has ever been opened on this phone (nothing saved yet).
const hadSavedData = loadState();
if (!hadSavedData){
  seedTask('Database Fundamentals', 'ERD Assignment', 1.4, 'medium');
  seedTask('ICG511S', 'Pseudocode Exercise', 3, 'light');
  seedTask('C Programming', 'Lab Report — Structs', 5, 'light');
  seedTask('BMC511S', 'Case Study Write-up', 12, 'heavy');
}

function render(){
  saveState();
  document.getElementById('demo-now').textContent = `Current time: ${fmtNow(now)}`;

  const open = tasks.filter(t=>!t.done).sort((a,b)=> daysFromNow(a.due) - daysFromNow(b.due));
  const done = tasks.filter(t=>t.done);

  document.getElementById('open-count-label').textContent = `Open (${open.length})`;
  document.getElementById('done-label').textContent = done.length ? `Done (${done.length})` : '';

  const openList = document.getElementById('open-list');
  if (open.length === 0){
    openList.innerHTML = `<div class="empty">All clear. Add a deadline to start tracking the fuse.</div>`;
  } else {
    openList.innerHTML = open.map(t => renderCard(t)).join('');
  }

  document.getElementById('done-list').innerHTML = done.map(t => renderDoneCard(t)).join('');

  document.getElementById('notif-list').innerHTML = notifications.length
    ? notifications.map(n => `<div class="notif-item"><span class="notif-time">${n.at}</span><span>${n.text}</span></div>`).join('')
    : `<div class="notif-item"><span>No notifications yet.</span></div>`;
}

function renderCard(t){
  const daysLeft = daysFromNow(t.due);
  const tier = getTier(daysLeft, t.effort);
  const totalSegs = EFFORT_SEGS[t.effort];
  const runway = EFFORT_RUNWAY[t.effort];
  const fractionBurned = Math.min(1, Math.max(0, 1 - (daysLeft / runway)));
  const litSegs = Math.round(fractionBurned * totalSegs);

  let segsHtml = '';
  for (let i=0;i<totalSegs;i++){
    const lit = i < litSegs;
    const pulseClass = (lit && tier==='critical') ? ' crit-pulse' : '';
    segsHtml += `<div class="seg${lit?' lit':''}${pulseClass}" style="${lit ? `background:${TIER_COLOR[tier]}` : ''}"></div>`;
  }

  return `
    <div class="card">
      <div class="card-top">
        <div>
          <p class="course">${t.course}</p>
          <p class="title">${t.title}</p>
        </div>
        <span class="effort-pill">${t.effort.toUpperCase()}</span>
      </div>
      <div class="meta-row">
        <span class="countdown">${fmtCountdown(daysLeft)}</span>
        <span class="tier-tag" style="color:${TIER_COLOR[tier]}">${tier}</span>
      </div>
      <div class="fuse">${segsHtml}</div>
      <div class="card-actions">
        <button class="done-btn" onclick="markDone(${t.id})">Mark done</button>
      </div>
    </div>`;
}

function renderDoneCard(t){
  return `
    <div class="card is-done">
      <div class="card-top">
        <div>
          <p class="course">${t.course}</p>
          <p class="title">${t.title}</p>
        </div>
      </div>
      <div class="done-check">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Done — reminders stopped
      </div>
    </div>`;
}

function markDone(id){
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  t.done = true;
  pushNotif(`“${t.title}” marked done — reminders stopped.`);
  render();
}

// Checks every open task against the current "now" and fires a
// notification whenever a task crosses into a new urgency tier
// (or becomes overdue). Called on a timer and after demo fast-forward.
function checkTierChanges(){
  tasks.forEach(t=>{
    if (t.done) return;
    const daysLeft = daysFromNow(t.due);
    const tier = getTier(daysLeft, t.effort);
    if (tier !== t.lastTier){
      if (daysLeft <= 0){
        pushNotif(`“${t.title}” is now OVERDUE — still marked incomplete.`);
      } else {
        pushNotif(`“${t.title}” moved to ${tier.toUpperCase()} — ${fmtCountdown(daysLeft)}.`);
      }
      t.lastTier = tier;
    }
  });
}

function fastForward(){
  timeOffset += 86400000;
  tickClock();
  checkTierChanges();
  render();
}

function openModal(){
  document.getElementById('overlay').classList.add('open');
  const d = new Date(now.getTime() + 5*86400000);
  d.setHours(23,59,0,0);
  document.getElementById('f-date').value = toLocalInputValue(d);
  document.getElementById('f-course').value = '';
  document.getElementById('f-title').value = '';
  selectedEffort = 'medium';
  document.querySelectorAll('.pill-opt').forEach(p=>p.classList.toggle('active', p.dataset.v==='medium'));
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function pickEffort(v){
  selectedEffort = v;
  document.querySelectorAll('.pill-opt').forEach(p=>p.classList.toggle('active', p.dataset.v===v));
}
function addTask(){
  const course = document.getElementById('f-course').value.trim() || 'General';
  const title = document.getElementById('f-title').value.trim();
  const dateVal = document.getElementById('f-date').value;
  if (!title || !dateVal){ return; }
  const due = new Date(dateVal);
  const daysLeft = daysFromNow(due);
  const tier = getTier(daysLeft, selectedEffort);
  tasks.push({ id: nextId++, course, title, due, effort: selectedEffort, done:false, lastTier: tier });
  pushNotif(`Added “${title}” — tracking started (${tier.toUpperCase()})`);
  closeModal();
  render();
}

render();

// Real-time tick: keeps the clock current and checks for tier changes
// (and fires notifications) every 20 seconds while the app is open.
setInterval(() => {
  tickClock();
  checkTierChanges();
  render();
}, 20000);
</script>
</body>
</html>
